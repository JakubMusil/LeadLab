{% extends "frontend/dashboard_base.html" %}
{% load static %}

{% block title %}Customers – LeadLab{% endblock %}
{% block page_title %}Customers{% endblock %}

{% block content %}

<!-- Toolbar -->
<div class="flex flex-wrap items-center justify-between gap-3 mb-5">
  <div class="relative">
    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
    <input id="search-input" type="text" placeholder="Search customers…"
           oninput="searchCustomers(this.value)"
           class="pl-9 pr-4 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-red-500 w-64">
  </div>
  <button onclick="openModal()"
          class="btn-primary text-sm font-semibold px-4 py-2 rounded-xl flex items-center gap-2">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
    </svg>
    New Customer
  </button>
</div>

<!-- Table -->
<div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
  <table class="w-full text-sm">
    <thead>
      <tr class="border-b border-gray-100 bg-gray-50">
        <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 uppercase tracking-wider">Name</th>
        <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 uppercase tracking-wider hidden md:table-cell">Email</th>
        <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 uppercase tracking-wider hidden lg:table-cell">Company</th>
        <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 uppercase tracking-wider hidden lg:table-cell">Tags</th>
        <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 uppercase tracking-wider hidden xl:table-cell">Phone</th>
        <th class="px-5 py-3.5"></th>
      </tr>
    </thead>
    <tbody id="customers-table" class="divide-y divide-gray-50">
      <tr><td colspan="6" class="text-center py-10 text-gray-400">Loading…</td></tr>
    </tbody>
  </table>
</div>

<!-- Customer Modal -->
<div id="customer-modal" class="modal-overlay hidden">
  <div class="modal-box w-full max-w-lg">
    <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <h2 class="text-lg font-bold text-gray-900 mb-5" id="modal-title">New Customer</h2>
    <div id="modal-error" class="hidden bg-red-50 text-red-700 text-sm px-4 py-3 rounded-lg mb-4 border border-red-100"></div>
    <form id="customer-form" class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">First name *</label>
          <input id="c-first" type="text" required placeholder="Jane"
                 class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm input-red focus:outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Last name</label>
          <input id="c-last" type="text" placeholder="Smith"
                 class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm input-red focus:outline-none">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
        <input id="c-email" type="email" placeholder="jane@company.com"
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm input-red focus:outline-none">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Phone</label>
          <input id="c-phone" type="text" placeholder="+1 555 000 000"
                 class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm input-red focus:outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Company</label>
          <input id="c-company" type="text" placeholder="Acme Corp"
                 class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm input-red focus:outline-none">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Tags <span class="text-gray-400 font-normal">(comma separated)</span></label>
        <input id="c-tags" type="text" placeholder="vip, hot-lead, follow-up"
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm input-red focus:outline-none">
      </div>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="closeModal()"
                class="flex-1 border border-gray-200 text-gray-700 font-medium py-2.5 rounded-xl text-sm hover:bg-gray-50">
          Cancel
        </button>
        <button type="submit"
                class="flex-1 btn-primary font-semibold py-2.5 rounded-xl text-sm">
          Save Customer
        </button>
      </div>
    </form>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
let customers = [];
let editingId = null;
let searchTimer = null;

async function loadCustomers(search = '') {
  const res = await Customers.list(search);
  const tbody = document.getElementById('customers-table');
  if (!res || !res.ok) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-gray-400">${res && res.status === 403 ? 'Select a workspace first' : 'Failed to load customers'}</td></tr>`;
    return;
  }
  customers = res.data;
  if (!customers.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-gray-400">No customers found. Add your first contact!</td></tr>';
    return;
  }
  tbody.innerHTML = customers.map(c => {
    const name = [c.first_name, c.last_name].filter(Boolean).join(' ');
    const initials = (c.first_name?.[0] || '') + (c.last_name?.[0] || '');
    const tags = (c.tags || []).slice(0, 3).map(t => `<span class="badge bg-gray-100 text-gray-600">${escHtml(t)}</span>`).join(' ');
    return `<tr class="table-row-hover">
      <td class="px-5 py-4">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center flex-shrink-0">
            <span class="text-red-600 text-xs font-bold">${escHtml(initials.toUpperCase() || '?')}</span>
          </div>
          <div>
            <div class="font-medium text-gray-900">${escHtml(name || '—')}</div>
          </div>
        </div>
      </td>
      <td class="px-5 py-4 hidden md:table-cell text-gray-500">${escHtml(c.email || '—')}</td>
      <td class="px-5 py-4 hidden lg:table-cell text-gray-500">${escHtml(c.company_name || '—')}</td>
      <td class="px-5 py-4 hidden lg:table-cell">${tags || '<span class="text-gray-300">—</span>'}</td>
      <td class="px-5 py-4 hidden xl:table-cell text-gray-500">${escHtml(c.phone || '—')}</td>
      <td class="px-5 py-4 text-right">
        <div class="flex items-center justify-end gap-2">
          <button onclick="openModal('${c.id}')"
                  class="text-gray-400 hover:text-blue-500 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          </button>
          <button onclick="deleteCustomer('${c.id}')"
                  class="text-gray-300 hover:text-red-500 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function searchCustomers(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadCustomers(val), 300);
}

function openModal(id = null) {
  editingId = id;
  document.getElementById('modal-title').textContent = id ? 'Edit Customer' : 'New Customer';
  document.getElementById('modal-error').classList.add('hidden');
  if (!id) {
    document.getElementById('customer-form').reset();
  } else {
    const c = customers.find(x => x.id === id);
    if (c) {
      document.getElementById('c-first').value = c.first_name;
      document.getElementById('c-last').value = c.last_name;
      document.getElementById('c-email').value = c.email;
      document.getElementById('c-phone').value = c.phone;
      document.getElementById('c-company').value = c.company_name;
      document.getElementById('c-tags').value = (c.tags || []).join(', ');
    }
  }
  document.getElementById('customer-modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('customer-modal').classList.add('hidden'); }

document.getElementById('customer-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const errEl = document.getElementById('modal-error');
  errEl.classList.add('hidden');
  const tagsRaw = document.getElementById('c-tags').value;
  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
  const data = {
    first_name: document.getElementById('c-first').value.trim(),
    last_name: document.getElementById('c-last').value.trim(),
    email: document.getElementById('c-email').value.trim(),
    phone: document.getElementById('c-phone').value.trim(),
    company_name: document.getElementById('c-company').value.trim(),
    tags,
    metadata: {},
  };
  const res = editingId ? await Customers.update(editingId, data) : await Customers.create(data);
  if (res && res.ok) {
    closeModal();
    loadCustomers();
    showToast(editingId ? 'Customer updated' : 'Customer added');
  } else {
    errEl.textContent = (res && res.data && res.data.detail) || 'Failed to save customer';
    errEl.classList.remove('hidden');
  }
});

async function deleteCustomer(id) {
  if (!confirm('Delete this customer? This cannot be undone.')) return;
  const res = await Customers.remove(id);
  if (res && res.status === 204) { loadCustomers(); showToast('Customer deleted'); }
  else showToast('Failed to delete', 'error');
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

setTimeout(loadCustomers, 400);
</script>
{% endblock %}
