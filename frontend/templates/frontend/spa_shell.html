<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/static/frontend/spa/favicon.ico" />
    <title>LeadLab</title>
    {% for css_url in spa_css_urls %}
    <link rel="stylesheet" crossorigin href="{{ css_url }}" />
    {% endfor %}
  </head>
  <body>
    <div id="app"></div>
    {% if spa_js_url %}
    <script type="module" crossorigin src="{{ spa_js_url }}"></script>
    {% else %}
    <div style="padding: 2rem; font-family: sans-serif; color: #374151;">
      <h2>Frontend not built</h2>
      <p>
        Run <code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;">npm run build</code>
        inside the <code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;">frontend-spa/</code>
        directory to generate the SPA assets.
      </p>
    </div>
    {% endif %}
  </body>
</html>
