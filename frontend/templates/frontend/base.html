{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LeadLab{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: { 50:'#FEF2F2', 100:'#FEE2E2', 600:'#DC2626', 700:'#B91C1C', 800:'#991B1B' } } } }
    }
  </script>
  <link rel="stylesheet" href="{% static 'frontend/css/main.css' %}">
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 font-sans antialiased">
  {% block body %}{% endblock %}
  <script src="{% static 'frontend/js/api.js' %}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
