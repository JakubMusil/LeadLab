services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-leadlab}
      POSTGRES_USER: ${DB_USER:-leadlab}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-leadlab}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadlab"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py reset_db --noinput &&
             python manage.py migrate --noinput &&
             python manage.py load_demo_data --email $${SEED_EMAIL:-info@jakubmusil.cz} --password $${SEED_PASSWORD:-login} --superadmin &&
             daphne -b 0.0.0.0 -p 8000 leadlab.asgi:application"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  worker:
    build: .
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
    command: celery -A leadlab worker --loglevel=info

  beat:
    build: .
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
    command: celery -A leadlab beat --loglevel=info

volumes:
  db_data:
  redis_data:
