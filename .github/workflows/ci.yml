name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-spa/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend-spa

      - name: Locale coverage check
        run: node scripts/check-locales.mjs
        working-directory: frontend-spa

      - name: Type-check
        run: npm run type-check
        working-directory: frontend-spa

      - name: Lint
        run: npm run lint
        working-directory: frontend-spa

      - name: Unit tests
        run: npm run test:unit -- --run
        working-directory: frontend-spa

      - name: Build SPA
        run: npm run build-only
        working-directory: frontend-spa

  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Security audit (pip-audit)
        run: pip-audit --requirement requirements.txt --skip-editable

      - name: Lint with flake8
        run: |
          flake8 . --count --max-line-length=120 --extend-ignore=E501 \
            --exclude=migrations,__pycache__,.venv,staticfiles

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: leadlab.settings
          DJANGO_SECRET_KEY: ci-secret-key-not-for-production
          DJANGO_DEBUG: "True"
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: ":memory:"
          RATELIMIT_ENABLE: "False"
          AXES_ENABLE: "False"
        run: |
          coverage run --source=. manage.py test --verbosity=2
          coverage report --fail-under=70
          coverage xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend, lint-and-test]
    # E2E tests require a running server; only run on pushes to main/master
    # or when explicitly requested via a label.  On PRs they are advisory.
    if: github.event_name == 'push'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: leadlab_e2e
          POSTGRES_USER: leadlab
          POSTGRES_PASSWORD: leadlab
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Set up Node.js 20 (SPA build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-spa/package-lock.json

      - name: Build SPA
        run: |
          npm ci --legacy-peer-deps
          npm run build-only
        working-directory: frontend-spa

      - name: Apply migrations
        env:
          DJANGO_SETTINGS_MODULE: leadlab.settings
          DJANGO_SECRET_KEY: ci-e2e-secret
          DJANGO_DEBUG: "True"
          DB_ENGINE: django.db.backends.postgresql
          DB_NAME: leadlab_e2e
          DB_USER: leadlab
          DB_PASSWORD: leadlab
          DB_HOST: localhost
          DB_PORT: "5432"
          AXES_ENABLE: "False"
        run: python manage.py migrate --no-input

      - name: Collect static files
        env:
          DJANGO_SETTINGS_MODULE: leadlab.settings
          DJANGO_SECRET_KEY: ci-e2e-secret
          DJANGO_DEBUG: "True"
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: ":memory:"
          AXES_ENABLE: "False"
        run: python manage.py collectstatic --no-input

      - name: Start Django dev server
        env:
          DJANGO_SETTINGS_MODULE: leadlab.settings
          DJANGO_SECRET_KEY: ci-e2e-secret
          DJANGO_DEBUG: "True"
          DB_ENGINE: django.db.backends.postgresql
          DB_NAME: leadlab_e2e
          DB_USER: leadlab
          DB_PASSWORD: leadlab
          DB_HOST: localhost
          DB_PORT: "5432"
          AXES_ENABLE: "False"
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          # Wait until the server is up.
          for i in $(seq 1 30); do
            curl -s http://localhost:8000/api/v1/health/ && break
            sleep 2
          done

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install chromium --with-deps
        working-directory: e2e

      - name: Run Playwright E2E tests
        env:
          BASE_URL: http://localhost:8000
          E2E_EMAIL: e2e@leadlab.test
          E2E_PASSWORD: E2EPassword123!
        run: npx playwright test --project=chromium
        working-directory: e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/

  chromatic:
    name: Chromatic Visual Regression
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-spa/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend-spa
      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: frontend-spa
